services:
  backend:
    build: .
    container_name: zorvyn-backend
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      - mongo
    volumes:
      - .:/app
      - /app/node_modules

  mongo:
    image: mongo
    container_name: zorvyn-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: